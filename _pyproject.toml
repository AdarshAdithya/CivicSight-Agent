[project]
name = "civicsight-agent"
version = "1.0.0"
description = "Civic Action Agent powered by Google ADK and Gemini 2.0 Flash"
requires-python = ">=3.12"
dependencies = [
    "google-adk>=1.0.0",
    "groq>=0.9.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "streamlit>=1.42.0",
    "requests>=2.32.0",
    "pydantic>=2.7.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = ["ruff", "pytest", "httpx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py312"
